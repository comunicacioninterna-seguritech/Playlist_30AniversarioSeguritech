<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playlist - Webinars Aniversario 30</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#004E94;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --accent:#004E94;
      --accent-hover:#0060b8;
      --border:#e5e7eb;
      --btn-size:72px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Montserrat', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Inter, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{max-width:1000px;margin:0 auto;padding:20px}
    .title{color:#fff;margin:0 0 14px 0;font-weight:700;letter-spacing:.2px}
    .grid{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:16px;
      align-items:stretch;
    }
    @media (max-width:900px){
      .grid{ grid-template-columns: 1fr; }
	#listPanel { order: 2; }
	.player    { order: 1; }
    }
    .panel{
      background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    /* LISTA dentro del panel, con padding e inset de scrollbar */
    #listPanel{ display:flex; }
    .list{
      display:flex;flex-direction:column;
      padding:8px 12px 8px 8px;   /* INSET para que el scroll no toque el borde */
      background:#fff;
      overflow:auto;
      overscroll-behavior:contain;
      height:100%;
      scrollbar-gutter: stable both-edges; /* reserva espacio para la barra y mantiene borde redondeado */
      background-clip: padding-box;
    }
    .item{
      display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:10px;
      padding:10px 12px;border-bottom:1px solid #f3f4f6;cursor:pointer;background:#fff;
      text-align:left;margin:0;border:0;box-shadow:none;appearance:none;-webkit-appearance:none;outline:none;width:100%;
      border-radius:10px;
    }
    .item + .item{ margin-top:6px; } /* separa un poco los items */
    .item:last-child{border-bottom:none}
    button.item::-moz-focus-inner{ border:0; padding:0; }
    .item:focus{ outline:none; }
    .item:focus-visible{ outline:2px solid var(--accent); outline-offset:-2px; }
    .thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;border:1px solid #eef2f7}
    .name{font-size:14px;font-weight:600;}
    .desc{font-size:12px;color:var(--muted)}
    .dur{font-size:12px;color:var(--muted)}
    .item.active{background:#f7fbff}
    .item:hover{background:#f3f8ff}

    /* Scrollbar styling (WebKit) para dar “aire” al borde derecho */
    .list::-webkit-scrollbar{ width:12px; }
    .list::-webkit-scrollbar-track{ background:transparent; }
    .list::-webkit-scrollbar-thumb{
      background:#cfd8e3; border-radius:10px; border:3px solid #fff; /* borde blanco crea espacio/acolchonado */
    }
    /* Firefox */
    .list{ scrollbar-width: thin; scrollbar-color: #cfd8e3 transparent; }

    /* PLAYER */
    .player{padding:18px;display:flex;flex-direction:column;align-items:center}
    .cover{
      width:min(360px, 92%);aspect-ratio:1/1;object-fit:cover;border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,.15);border:1px solid #eef2f7;margin-bottom:12px;
    }
    .h2{margin:6px 0 2px 0;font-size:18px;font-weight:700;text-align:center}
    .status{font-size:12px;color:#6ea8ff;margin-bottom:6px}
    /* Mismo ancho que la portada y todo centrado */
.timeline{
  width: min(360px, 92%);     /* igual que .cover */
  display:flex;
  flex-direction: column;     
  align-items:center;         /* centra ambos */
  gap:6px;
  margin:6px 0 12px;
}
.time{
  font-size:14px;
  color:var(--muted);
  text-align:center;
  min-width:0;                /* quita el ancho mínimo para centrar perfecto */
}

/* La barra ocupa ese mismo ancho */
input[type="range"]{
  accent-color: var(--accent);
  width:100%;
}

    .controls{display:flex;gap:16px;align-items:center;justify-content:center}
    .btn{
      appearance:none;border:0;background:transparent;cursor:pointer;
      padding:0;border-radius:14px;outline-offset:4px;width:var(--btn-size);height:var(--btn-size);
      transition:transform .08s ease, filter .15s ease;display:inline-grid;place-items:center;
    }
    .btn:focus-visible{outline:2px solid var(--accent)}
    .btn:hover{transform:translateY(-1px);filter:drop-shadow(0 4px 10px rgba(0,0,0,.15))}
    .btn svg{width:100%;height:100%}

    @media (min-width:901px){
      #listPanel{ max-height: 80vh; } /* fallback, JS lo sincroniza con el alto del player */
    }
.title{ display:none !important; }



  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">Podcast – Selecciona un episodio</h1>
    <div class="grid">
      <!-- Lista ahora va dentro de un panel separado, con padding -->
      <aside class="panel" id="listPanel" aria-label="Lista de episodios">
        <div class="list" id="episodeList"></div>
      </aside>

      <!-- Reproductor -->
      <section class="panel player" aria-label="Reproductor">
        <img id="cover" class="cover" src="Introduccion_a_ISSABEL.png" alt="Portada">
        <div class="h2" id="epTitle">–</div>
        <div class="status" id="status">Sin iniciar</div>
        <audio id="player" preload="auto" aria-label="Reproductor de audio"></audio>

<div class="timeline">
  <span id="time" class="time" aria-live="polite">00:00 / 00:00</span>
  <input type="range" id="progress" value="0" min="0" step="1" aria-label="Barra de progreso">
</div>


        <div class="controls">
          <button id="btnBack" class="btn" aria-label="Retroceder 10 segundos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
              <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0060b8"/><stop offset="1" stop-color="#004E94"/></linearGradient></defs>
              <circle cx="38" cy="38" r="34" fill="url(#g)"/>
              <path d="M45 27v22l-16-11z" fill="#fff" opacity=".95"/>
              <path d="M33 27v22l-16-11z" fill="#fff" opacity=".95"/>
            </svg>
          </button>
          <button id="btnPlay" class="btn" aria-label="Reproducir o Pausar"></button>
          <button id="btnFwd" class="btn" aria-label="Avanzar 10 segundos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
              <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0060b8"/><stop offset="1" stop-color="#004E94"/></linearGradient></defs>
              <circle cx="38" cy="38" r="34" fill="url(#g3)"/>
              <path d="M31 27v22l16-11z" fill="#fff" opacity=".95"/>
              <path d="M43 27v22l16-11z" fill="#fff" opacity=".95"/>
            </svg>G
          </button>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ===== Lista de los items =====
const EPISODES = [
  { title: "Drones",  src: "DRONES_WEBINAR_VFINAL_AUDIO.mp3", cover: "1.png",  desc:"Impartidor del webinar 1 - Área de Desarrollo TIG" },
  { title: "SAIMOINTECH",  src: "SAIMONTECH_WEBINAR_FINAL_AUDIO.mp3", cover: "2.png",  desc:"Impartidor del webinar 2" },
  { title: "IA y Ciberseguridad",  src: "IA_CIBERSEGURIDAD_FINAL_AUDIO.mp3", cover: "3.png",  desc:"Impartidor del webinar 3" },
  { title: "Proyecto Centinela",  src: "PROYECTO_CENTINELA_FINAL_AUDIO.mp3", cover: "4.png",  desc:"Impartidor del webinar 4" },
  { title: "Webinar 5",  src: "Introduccion_a_ISSABEL.mp3", cover: "5.png",  desc:"Impartidor del webinar 5" },
  { title: "Webinar 6",  src: "Introduccion_a_ISSABEL.mp3", cover: "6.png",  desc:"Impartidor del webinar 6" },
  { title: "Webinar 7",  src: "Introduccion_a_ISSABEL.mp3", cover: "7.png",  desc:"Impartidor del webinar 7" },
  { title: "Webinar 8",  src: "Introduccion_a_ISSABEL.mp3", cover: "8.png",  desc:"Impartidor del webinar 8" },
  { title: "Webinar 9",  src: "Introduccion_a_ISSABEL.mp3", cover: "9.png",  desc:"Impartidor del webinar 9" },
  { title: "Webinar 10", src: "Introduccion_a_ISSABEL.mp3", cover: "10.png", desc:"Impartidor del webinar 10" },
];

    // ===== UI & lógica =====
    const list = document.getElementById('episodeList');
    const listPanel = document.getElementById('listPanel');
    const player = document.getElementById('player');
    const cover  = document.getElementById('cover');
    const status = document.getElementById('status');
    const epTitle= document.getElementById('epTitle');
    const btnPlay= document.getElementById('btnPlay');
    const btnBack= document.getElementById('btnBack');
    const btnFwd = document.getElementById('btnFwd');
    const progress = document.getElementById('progress');
    const timeEl   = document.getElementById('time');

    let currentIndex = 0;
    let scrubbing = false;

    function renderList() {
      list.innerHTML = '';
      EPISODES.forEach((ep, i) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'item' + (i === currentIndex ? ' active' : '');
        item.setAttribute('aria-label', 'Reproducir ' + ep.title);
        item.innerHTML = `
          <img class="thumb" src="${ep.cover}" alt="Portada">
          <div>
            <div class="name">${ep.title}</div>
            <div class="desc">${ep.desc||''}</div>
          </div>
          <div class="dur"></div>
        `;
        item.addEventListener('click', () => loadEpisode(i, true));
        list.appendChild(item);
      });
    }

    function loadEpisode(i, autoplay=false) {
      currentIndex = i;
      [...list.children].forEach((c, idx) => c.classList.toggle('active', idx===i));
      const ep = EPISODES[i];
      cover.src = ep.cover;
      cover.alt = 'Portada – ' + ep.title;
      epTitle.textContent = ep.title;
      player.src = ep.src;
      status.textContent = 'Listo';
      setPlayIcon();
      progress.value = 0;
      timeEl.textContent = '00:00 / 00:00';
      if (autoplay) {
        const p = player.play();
        if (p && typeof p.catch === 'function') p.catch(()=>{});
      }
      syncListHeight();
    }

    // Controles
    btnPlay.addEventListener('click', ()=> player.paused ? player.play() : player.pause());
    btnBack.addEventListener('click', ()=> player.currentTime = Math.max(0, player.currentTime-10));
    btnFwd .addEventListener('click', ()=> player.currentTime = Math.min(player.duration||1, player.currentTime+10));

    // Atajos de teclado
    window.addEventListener('keydown', (e)=>{
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space' || e.key.toLowerCase() === 'k') { e.preventDefault(); player.paused ? player.play() : player.pause(); }
      if (e.key.toLowerCase() === 'j') { player.currentTime = Math.max(0, player.currentTime-10); }
      if (e.key.toLowerCase() === 'l') { player.currentTime = Math.min(player.duration||1, player.currentTime+10); }
    });

    // Timeline y tiempo
    player.addEventListener('loadedmetadata', ()=>{
      const dur = Math.floor(player.duration || 0);
      progress.max = dur > 0 ? dur : 0;
      progress.value = 0;
      timeEl.textContent = `${formatTime(0)} / ${formatTime(dur)}`;
      syncListHeight();
    });
    player.addEventListener('durationchange', ()=>{
      const dur = Math.floor(player.duration || 0);
      if (dur > 0) {
        progress.max = dur;
        timeEl.textContent = `${formatTime(Math.floor(player.currentTime||0))} / ${formatTime(dur)}`;
      }
      syncListHeight();
    });
    player.addEventListener('timeupdate', ()=>{
      const cur = Math.floor(player.currentTime || 0);
      const dur = Math.floor(player.duration || 0);
      if (!scrubbing) progress.value = cur;
      timeEl.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
    });

    progress.addEventListener('pointerdown', ()=>{ scrubbing = true; });
    window.addEventListener('pointerup', ()=>{ scrubbing = false; });
    progress.addEventListener('input', ()=>{
      player.currentTime = progress.value;
      const cur = Math.floor(progress.value);
      const dur = Math.floor(player.duration || 0);
      timeEl.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
    });

    // Estados del reproductor
    player.addEventListener('play',  ()=>{ status.textContent = 'Reproduciendo'; setPauseIcon(); });
    player.addEventListener('pause', ()=>{ status.textContent = 'En pausa';     setPlayIcon();  });
    player.addEventListener('ended', ()=>{
      status.textContent = 'Terminado';
      setPlayIcon();
      if (currentIndex < EPISODES.length - 1) loadEpisode(currentIndex + 1, true);
    });

    // Íconos
    function setPauseIcon(){
      btnPlay.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
          <defs><linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#004E94"/><stop offset="1" stop-color="#0060b8"/>
          </linearGradient></defs>
          <circle cx="38" cy="38" r="34" fill="url(#g4)"/>
          <rect x="29" y="24" width="6" height="28" rx="2" fill="#fff"/>
          <rect x="41" y="24" width="6" height="28" rx="2" fill="#fff"/>
          <circle cx="38" cy="38" r="34" fill="none" stroke="#ffffff55" stroke-width="2"/>
        </svg>`;
    }
    function setPlayIcon(){
      btnPlay.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76">
          <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#004E94"/><stop offset="1" stop-color="#0060b8"/>
          </linearGradient></defs>
          <circle cx="38" cy="38" r="34" fill="url(#g2)"/>
          <path d="M31 25l22 13-22 13z" fill="#fff" opacity=".97"/>
          <circle cx="38" cy="38" r="34" fill="none" stroke="#ffffff55" stroke-width="2"/>
        </svg>`;
    }

    function formatTime(s){
      if (!Number.isFinite(s)) return '00:00';
      const m = Math.floor(s/60); const ss = Math.floor(s%60);
      return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    // === Sincroniza altura de panel de lista con el panel del reproductor ===
    const playerPanel = document.querySelector('.panel.player');
    function syncListHeight(){
      const twoCol = window.matchMedia('(min-width: 901px)').matches;
      if (!twoCol) { listPanel.style.maxHeight = ''; return; }
      const h = playerPanel.getBoundingClientRect().height;
      if (h > 0) listPanel.style.maxHeight = h + 'px';
    }
    window.addEventListener('load', syncListHeight);
    document.addEventListener('DOMContentLoaded', syncListHeight);
    window.addEventListener('resize', syncListHeight);
    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => syncListHeight());
      ro.observe(playerPanel);
    }
    requestAnimationFrame(syncListHeight);

    // Inicializar
    renderList();
    loadEpisode(0, false);
  </script>
</body>
</html>
